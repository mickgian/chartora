services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chartora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chartora}
      POSTGRES_DB: ${POSTGRES_DB:-chartora}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chartora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      CHARTORA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chartora}:${POSTGRES_PASSWORD:-chartora}@db:5432/${POSTGRES_DB:-chartora}
      CHARTORA_NEWS_API_KEY: ${NEWS_API_KEY:-}
      CHARTORA_CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    ports:
      - "8085:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8085
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8085
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${PLAUSIBLE_DOMAIN:-}
      NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL: ${PLAUSIBLE_SCRIPT_URL:-}
    ports:
      - "3002:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/chartora.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
